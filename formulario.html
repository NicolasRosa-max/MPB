<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
    <header id="cabecalho">  
        <a href="index.html"><h1>A música popular brasileira.</h1></a>
        <h2>Álbuns MPB</h2>
        <a href="index.html">Voltar para a página principal</a>
    </nav>
    </header>
    <div id="info_pessoal">
        <form action="" method="" autocomplete="off">
            <legend><strong><h2>Informações pessoais</h2></strong></legend>
            <br>
            <label for="nome">Informe seu Nome: </label>
            <input type="text" name="nome" minlength="3" maxlength="25" required><br>
            <label for="email">Informe seu email: </label>
            <input type="email" name="email" minlength="10" maxlength="50" required placeholder="ex: @gmail.com"><br>
            <label for="idade">Informe sua idade:</label>
            <input type="number" name="idade" id="idade" min="0" max="100"><br>
            <label for="genero">Diga seu gênero músical favorito:</label>
            <input type="text" name="genero" id="genero" minlength="3"><br><br>
        </form>
    </div>
        <h2>
        <img src="img\album1 teste.png" alt="Transa - Caetano Veloso">
    </h2>
    <label>De uma nota para este álbum: </label>
    <input type="text" id="nota_datalist" list="nota" required>
    <datalist id="nota">
        <option>⭐</option>
        <option>⭐⭐</option>
        <option>⭐⭐⭐</option>
        <option>⭐⭐⭐⭐</option>
        <option>⭐⭐⭐⭐⭐</option>
    </datalist><br><br>
        <label for="mensagem">Diga sua opinião sobre o álbum:</label><br>
        <textarea cows="45" rows="10" id="mensagem" name="mensagem"></textarea><br><br>


    <footer class="rodape">
        <hr>
        <p>© 2026 A Musica Popular Brasileira, criado por Nicolas Rios, Guilherme Souza & Lucas Lorenzi</p>
    </footer>
</body>
</html>
